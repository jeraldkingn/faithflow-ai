name: Generate Video

on:
  schedule:
    - cron: "30 4-16/3 * * *"   # 5 times a day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🔍 Debug files
        run: ls -la

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎬 Install ffmpeg
        run: sudo apt update && sudo apt install -y ffmpeg
      
      - name: 📝 Create credentials file
        run: |
          cat <<EOF > credentials.json
          ${{ secrets.GOOGLE_CREDENTIALS }}
          EOF

      - name: ▶️ Run video script
        env:
          LINE_1: ${{ github.event.inputs.line1 }}
          LINE_2: ${{ github.event.inputs.line2 }}
          LINE_3: ${{ github.event.inputs.line3 }}
          LINE_4: ${{ github.event.inputs.line4 }}
          LINE_5: ${{ github.event.inputs.line5 }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: python main.py

      - name: 📤 Upload video
        uses: actions/upload-artifact@v4
        with:
          name: generated-video
          path: videos/*.mp4